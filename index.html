<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nationality Predictor</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 min-h-screen flex items-center justify-center p-4">

    <div class="bg-white p-8 rounded-3xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-center text-slate-800 mb-6">Millatni aniqlash</h1>
        
        <div class="space-y-4">
            <input 
                id="nameInput"
                type="text" 
                placeholder="Ismni kiriting (masalan: Alisher)" 
                class="w-full p-4 border-2 border-slate-200 rounded-xl outline-none focus:border-blue-500 transition-all text-lg"
            >
            
            <button 
                id="searchBtn"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-4 rounded-xl shadow-lg transition-transform active:scale-95"
            >
                Aniqlash
            </button>
        </div>

        <div id="result" class="mt-8 hidden">
            <div class="flex flex-col items-center p-6 bg-slate-50 rounded-2xl border border-slate-100">
                <p id="countryName" class="text-lg font-semibold text-slate-700 mb-4"></p>
                <img id="flagImg" src="" alt="Flag" class="w-32 shadow-md rounded-lg">
            </div>
        </div>

        <p id="error" class="text-red-500 text-center mt-4 hidden italic"></p>
    </div>

    <script src="main.js"></script>
</body>
</html>
